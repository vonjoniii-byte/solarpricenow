<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Solar Price Now — Instant Solar Quote Calculator</title>
  <meta name="description" content="Get an instant, personalised solar system price estimate. Enter your power bill and get a recommended system size, estimated cost, and savings after rebates in seconds.">

  <!-- Open Graph (Facebook, Instagram, LinkedIn, iMessage link previews) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Solar Price Now">
  <meta property="og:title" content="Solar Price Now — Instant Solar Quote Calculator">
  <meta property="og:description" content="Get an instant, personalised solar system price estimate. Enter your power bill and get a recommended system size, estimated cost, and savings after rebates in seconds.">
  <meta property="og:url" content="https://solarpricenow.com.au">
  <!-- TODO: add og:image once a share-card graphic exists (recommended size 1200x630px) -->
  <!-- <meta property="og:image" content="https://solarpricenow.com.au/social-share.png"> -->

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Solar Price Now — Instant Solar Quote Calculator">
  <meta name="twitter:description" content="Get an instant, personalised solar system price estimate. Enter your power bill and get a recommended system size, estimated cost, and savings after rebates in seconds.">

  <!-- Structured data: helps search engines understand what this page/service is -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Service",
    "name": "Solar Price Now",
    "description": "Instant solar system price and savings calculator for Australian households.",
    "url": "https://solarpricenow.com.au",
    "areaServed": "AU",
    "provider": {
      "@type": "Organization",
      "name": "Solar Price Now"
    }
  }
  </script>

  <!-- TODO: favicon is missing from this repo entirely — add web/favicon.png (and
       reference it here) and consider web/manifest.json + icons/ for full PWA/
       home-screen support. Not present in this file or the web/ folder currently. -->

  <style>
    /* Loading shell — visible during CanvasKit WASM load (~1–2s on mobile 3G).
       Prevents blank-white flash. See UX_SPEC.md §2.1. */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    #loading-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      background: #ffffff;
    }

    /* Placeholder logo area: 120×40px light-grey rounded rect */
    .logo-placeholder {
      width: 120px;
      height: 40px;
      background: #E5E7EB;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    /* Shimmer loading bar */
    .loading-bar-container {
      width: 200px;
      height: 4px;
      background: #E5E7EB;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .loading-bar-inner {
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        #E5E7EB 0%,
        #D1D5DB 50%,
        #E5E7EB 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% center;
      }
      100% {
        background-position: -200% center;
      }
    }

    .loading-caption {
      font-size: 13px;
      color: #6B7280;
    }
  </style>
</head>
<body>
  <!-- Loading shell — replaced by Flutter CanvasKit when engine is ready -->
  <div id="loading-shell">
    <div class="logo-placeholder"></div>
    <div class="loading-bar-container">
      <div class="loading-bar-inner"></div>
    </div>
    <span class="loading-caption">Loading…</span>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var shell = document.getElementById('loading-shell');
      if (shell) {
        shell.style.display = 'none';
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
